<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 82" role="img" aria-label="Live Impianti S.r.l.">
  <defs>
    <filter id="txt-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="rgba(0,0,0,0.55)" />
    </filter>
  </defs>

  <!-- Icona: sfondo teal -->
  <rect x="0" y="2" width="78" height="78" rx="13" fill="#00a79e"/>

  <!-- Quadrato giallo-verde ruotato -->
  <rect x="6" y="6" width="66" height="66" rx="9" fill="#cbd000"
        transform="rotate(-5 39 39)"/>

  <!-- Spirale -->
  <path d="M39,18 C52,18 61,28 61,39 C61,50 51,59 39,59
           C28,59 21,50 21,39 C21,30 28,24 39,24
           C48,24 53,31 53,39 C53,46 47,51 39,51
           C33,51 32,46 32,39"
        fill="none" stroke="#0f1923" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="39" cy="39" r="2.8" fill="#0f1923"/>

  <!-- LIVE in giallo-verde brand + shadow per visibilit� -->
  <text x="90" y="52"
        font-family="'Arial Black','Arial',Helvetica,sans-serif"
        font-weight="900" font-size="48" fill="#cbd000"
