  <!-- IMPIANTI in teal brand + shadow -->
  <text x="91" y="78"
        font-family="'Arial Black','Arial',Helvetica,sans-serif"
        font-weight="900" font-size="27" fill="#00a79e"
        letter-spacing="5" filter="url(#txt-shadow)">IMPIANTI</text>
</svg>
